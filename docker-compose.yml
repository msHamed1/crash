services:
  mysql:
    image: mysql:8.4
    container_name: crash-mysql
    environment:
      MYSQL_DATABASE: crash_game
      MYSQL_USER: crash
      MYSQL_PASSWORD: crash_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ucrash -pcrash_password --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: crash-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: crash-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: crash
      RABBITMQ_DEFAULT_PASS: crash_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rng-service:
    build:
      context: .
      dockerfile: src/RngService/Dockerfile
    container_name: crash-rng-service
    environment:
      ASPNETCORE_URLS: http://+:8080
      MySql__ConnectionString: Server=mysql;Port=3306;Database=crash_game;User=crash;Password=crash_password;
      Rng__ServerSeedEncryptionKey: XTTjvgjhdnIEGijXEuDdt0cfk0cMgCG/rbRTNGt/bb8=
    ports:
      - "5001:8080"
    depends_on:
      mysql:
        condition: service_healthy

  realtime-gateway:
    build:
      context: .
      dockerfile: src/RealtimeGateway/Dockerfile
    container_name: crash-realtime-gateway
    environment:
      ASPNETCORE_URLS: http://+:8080
      Broker__HostName: rabbitmq
      Broker__Port: 5672
      Broker__UserName: crash
      Broker__Password: crash_password
      Broker__ExchangeName: crash.player-messages
      MySql__ConnectionString: Server=mysql;Port=3306;Database=crash_game;User=crash;Password=crash_password;
      Jwt__SigningKey: local-dev-signalr-jwt-signing-key-change-me
    ports:
      - "5003:8080"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: docker/client/Dockerfile
    container_name: crash-client
    ports:
      - "80:80"
    depends_on:
      - realtime-gateway

  game-engine:
    build:
      context: .
      dockerfile: src/GameEngine/Dockerfile
    container_name: crash-game-engine
    environment:
      ASPNETCORE_URLS: http://+:8080
      MySql__ConnectionString: Server=mysql;Port=3306;Database=crash_game;User=crash;Password=crash_password;
      Services__Rng__Address: http://rng-service:8080
      Broker__HostName: rabbitmq
      Broker__Port: 5672
      Broker__UserName: crash
      Broker__Password: crash_password
      Broker__ExchangeName: crash.player-messages
      GameEngine__EngineId: engine-1
   
    ports:
      - "5002:8080"
    depends_on:
      rng-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  game-engine-2:
    build:
      context: .
      dockerfile: src/GameEngine/Dockerfile
    container_name: crash-game-engine-2
    environment:
      ASPNETCORE_URLS: http://+:8080
      MySql__ConnectionString: Server=mysql;Port=3306;Database=crash_game;User=crash;Password=crash_password;
      Services__Rng__Address: http://rng-service:8080
      Broker__HostName: rabbitmq
      Broker__Port: 5672
      Broker__UserName: crash
      Broker__Password: crash_password
      Broker__ExchangeName: crash.player-messages
      GameEngine__EngineId: engine-2
    ports:
      - "5004:8080"
    depends_on:
      rng-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  db-workers:
    build:
      context: .
      dockerfile: src/DbWorkers/Dockerfile
    deploy:
      replicas: 3
    environment:
      ASPNETCORE_URLS: http://+:8080
      MySql__ConnectionString: Server=mysql;Port=3306;Database=crash_game;User=crash;Password=crash_password;
      DbBroker__HostName: rabbitmq
      DbBroker__Port: 5672
      DbBroker__UserName: crash
      DbBroker__Password: crash_password
      DbBroker__ExchangeName: db.worker-messages
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  mysql-data:
  rabbitmq-data:
