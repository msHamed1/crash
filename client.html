<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crash SignalR Client</title>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #17202a;
    }

    body {
      margin: 0;
      padding: 32px;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    section {
      background: #ffffff;
      border: 1px solid #d9e0e8;
      border-radius: 8px;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.2;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      height: 38px;
      padding: 0 10px;
      border: 1px solid #b8c2cc;
      border-radius: 6px;
      font-size: 15px;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      background: #1769aa;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    #status {
      font-weight: 700;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      border: 1px solid #d9e0e8;
      border-radius: 6px;
      padding: 12px;
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .metric span:first-child {
      color: #637083;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric span:last-child {
      font-size: 20px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .round-state {
      border-left: 4px solid #1769aa;
    }

    .round-state.crashed {
      border-left-color: #c62828;
    }

    .round-state.running {
      border-left-color: #12a150;
      box-shadow: 0 8px 26px rgba(18, 161, 80, 0.12);
    }

    .round-state.betting {
      border-left-color: #ef9b0f;
    }

    #currentMultiplier {
      font-size: clamp(30px, 7vw, 64px);
      font-variant-numeric: tabular-nums;
      transition: color 120ms ease, transform 120ms ease;
    }

    .round-state.crashed #currentMultiplier {
      color: #c62828;
      transform: scale(1.04);
    }

    .stream-health {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #637083;
      font-size: 13px;
    }

    .stream-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #9aa5b1;
    }

    .stream-dot.live {
      background: #12a150;
      box-shadow: 0 0 0 4px rgba(18, 161, 80, 0.12);
    }

    .stream-dot.stale {
      background: #c62828;
    }

    pre {
      min-height: 180px;
      margin: 0;
      padding: 12px;
      overflow: auto;
      border-radius: 6px;
      background: #101820;
      color: #d8f3dc;
      white-space: pre-wrap;
    }

    @media (max-width: 620px) {
      body {
        padding: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Crash SignalR Client</h1>

    <section>
      <h2>Connection</h2>
      <div class="grid">
        <label>
          Name
          <input id="name" value="Test Player" autocomplete="name">
        </label>
        <label>
          Username
          <input id="username" value="player-1" autocomplete="username">
        </label>
        <label>
          Table ID
          <input id="tableId" value="" readonly>
        </label>
        <label>
          Gateway API
          <input id="gatewayApi" value="http://localhost:5003">
        </label>
      </div>
      <button id="connectButton">Connect</button>
      <div>Status: <span id="status">disconnected</span></div>
    </section>

    <section id="roundState" class="round-state">
      <h2>Live Round</h2>
      <div class="metric-grid">
        <div class="metric">
          <span>Round</span>
          <span id="roundId">-</span>
        </div>
        <div class="metric">
          <span>Multiplier</span>
          <span id="currentMultiplier">1.00x</span>
        </div>
        <div class="metric">
          <span>Table</span>
          <span id="liveTableId">-</span>
        </div>
        <div class="metric">
          <span>Phase</span>
          <span id="roundPhase">Waiting</span>
        </div>
      </div>
      <div class="stream-health">
        <span id="streamDot" class="stream-dot"></span>
        <span id="streamHealth">Waiting for round data</span>
      </div>
    </section>

    <section>
      <h2>Bet Message</h2>
      <div class="grid">
        <label>
          Amount
          <input id="amount" type="number" min="0" step="0.01" value="10">
        </label>
        <label>
          Currency
          <input id="currency" value="USD">
        </label>
        <label>
          Auto Cash Out
          <input id="autoCashOut" type="number" min="1" step="0.01" value="2">
        </label>
      </div>
      <button id="sendBetButton" disabled>Send Bet</button>
    </section>

    <section>
      <h2>Log</h2>
      <pre id="log"></pre>
    </section>
  </main>

  <script>
    let connection = null;
    let loginSession = null;
    let roundView = createEmptyRoundView();
    let displayedMultiplier = 1;
    let multiplierAnimationFrame = null;
    const receivedMessageIds = new Set();

    const connectButton = document.getElementById("connectButton");
    const sendBetButton = document.getElementById("sendBetButton");
    const statusElement = document.getElementById("status");
    const logElement = document.getElementById("log");
    const roundStateElement = document.getElementById("roundState");
    const roundIdElement = document.getElementById("roundId");
    const currentMultiplierElement = document.getElementById("currentMultiplier");
    const liveTableIdElement = document.getElementById("liveTableId");
    const roundPhaseElement = document.getElementById("roundPhase");
    const streamDotElement = document.getElementById("streamDot");
    const streamHealthElement = document.getElementById("streamHealth");

    connectButton.addEventListener("click", connect);
    sendBetButton.addEventListener("click", sendBet);

    async function connect() {
      const gatewayApi = getValue("gatewayApi").replace(/\/$/, "");
      setStatus("requesting connection");
      connectButton.disabled = true;
      sendBetButton.disabled = true;

      try {
        if (connection) {
          await connection.stop();
          connection = null;
        }

        const response = await fetch(`${gatewayApi}/api/players/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
             username: getValue("username"),
           })
        });

        if (!response.ok) {
          const errorBody = await response.text();
          throw new Error(`Login API failed with ${response.status}: ${errorBody || response.statusText}`);
        }

        loginSession = normalizeLoginResponse(await response.json());
        document.getElementById("tableId").value = loginSession.player.tableId ?? "";
        appendLog("login session", loginSession);

        connection = new signalR.HubConnectionBuilder()
          .withUrl(loginSession.hubUrl, {
            accessTokenFactory: () => loginSession.token
          })
          .withAutomaticReconnect()
          .build();

        registerServerMessageHandlers(connection);

        connection.onreconnecting(() => {
          setStatus("reconnecting");
          sendBetButton.disabled = true;
          setStreamHealth("stale", "Realtime stream reconnecting");
        });
        connection.onreconnected(() => {
          setStatus("connected");
          refreshBetAvailability();
        });
        connection.onclose(() => {
          setStatus("disconnected");
          sendBetButton.disabled = true;
          setStreamHealth("stale", "Realtime stream disconnected");
        });

        await connection.start();
        setStatus(`connected as ${loginSession.player.externalId} on table ${loginSession.player.tableId}`);
        refreshBetAvailability();
      } finally {
        connectButton.disabled = false;
      }
    }

    async function sendBet() {
      if (!connection) {
        return;
      }

      if (!roundView.roundId || roundView.phase !== "Betting") {
        throw new Error("Bets are accepted only during the betting phase of an active round.");
      }

      const message = {
        correlationId: "new-"+ String(Date.now()),
        clientSentAtUtc: new Date().toISOString(),
        roundId: String(roundView.roundId),
        amount: Number(getValue("amount")),
        currency: getValue("currency"),
        autoCashoutEnabled: true,
        autoCashoutAt: Number(getValue("autoCashOut"))
        
      };

      await connection.invoke("Bet", message);
      appendLog("sent bet", message);
    }

    function registerServerMessageHandlers(hubConnection) {
      hubConnection.on("NewRoundInfo", message => {
        acceptRoundMessage(message, "NewRoundInfo");
      });

      hubConnection.on("RoundTick", message => {
        acceptRoundMessage(message, "RoundTick");
      });

      hubConnection.on("RoundCrashed", message => {
        acceptRoundMessage(message, "RoundCrashed");
      });

      hubConnection.on("CurrentState", message => {
        acceptRoundMessage(message, "CurrentState");
      });
    }

    function acceptRoundMessage(message, messageType) {
      const messageId = readField(message, "messageId", "MessageId");
      if (messageId && receivedMessageIds.has(messageId)) {
        return;
      }
      if (messageId) {
        receivedMessageIds.add(messageId);
        if (receivedMessageIds.size > 500) {
          receivedMessageIds.delete(receivedMessageIds.values().next().value);
        }
      }

      const roundId = readField(message, "roundId", "RoundId");
      const tableId = readField(message, "tableId", "TableId");
      const multiplier = readField(message, "currentMultiplier", "CurrentMultiplier");
      const sequence = Number(readField(message, "tickSequence", "TickSequence") ?? 0);
      const startsAtValue = readField(message, "startsAt", "StartsAt");

      if (roundId === undefined || roundId === null) {
        appendLog("ignored invalid server message", { messageType, reason: "roundId is missing" });
        return;
      }

      const normalizedRoundId = String(roundId);
      const isNewRound = roundView.roundId !== normalizedRoundId;

      // RabbitMQ/SignalR reconnects can redeliver messages. Never move the UI backwards.
      if (isNewRound && roundView.roundId && compareRoundIds(normalizedRoundId, roundView.roundId) < 0) {
        return;
      }
      if (!isNewRound && messageType === "NewRoundInfo" && roundView.sequence > 0) {
        return;
      }
      if (!isNewRound && messageType !== "NewRoundInfo" && sequence <= roundView.sequence) {
        return;
      }

      if (isNewRound) {
        roundView = createEmptyRoundView();
        roundView.roundId = normalizedRoundId;
        displayedMultiplier = 1;
      }

      roundView.tableId = tableId ?? roundView.tableId;
      roundView.sequence = Math.max(roundView.sequence, sequence);
      roundView.multiplier = toValidMultiplier(multiplier, roundView.multiplier);
      roundView.startsAt = startsAtValue ? new Date(startsAtValue) : roundView.startsAt;
      roundView.lastMessageAt = Date.now();
      roundView.phase = resolvePhase(messageType, message);

      renderRoundView();
      if (roundView.phase === "Crashed") {
        if (multiplierAnimationFrame) {
          cancelAnimationFrame(multiplierAnimationFrame);
        }
        displayedMultiplier = roundView.multiplier;
        currentMultiplierElement.textContent = `${displayedMultiplier.toFixed(2)}x`;
      } else {
        animateMultiplier();
      }
      setStreamHealth("live", `Live · tick ${roundView.sequence}`);

      // Logging every 50 ms eventually freezes the page; sample ticks but retain lifecycle events.
      if (messageType !== "RoundTick" || sequence % 20 === 0) {
        appendLog(`received ${messageType}`, message);
      }
    }

    function resolvePhase(messageType, message) {
      if (messageType === "RoundCrashed" || isCrashed(message)) {
        return "Crashed";
      }
      if (messageType === "RoundTick") {
        return "Running";
      }
      return roundView.startsAt && roundView.startsAt.getTime() > Date.now() ? "Betting" : "Running";
    }

    function renderRoundView() {
      roundIdElement.textContent = roundView.roundId ?? "-";
      liveTableIdElement.textContent = roundView.tableId ?? "-";
      roundPhaseElement.textContent = phaseLabel();
      roundStateElement.classList.toggle("crashed", roundView.phase === "Crashed");
      roundStateElement.classList.toggle("running", roundView.phase === "Running");
      roundStateElement.classList.toggle("betting", roundView.phase === "Betting");
      refreshBetAvailability();
    }

    function phaseLabel() {
      if (roundView.phase !== "Betting" || !roundView.startsAt) {
        return roundView.phase;
      }
      const seconds = Math.max(0, (roundView.startsAt.getTime() - Date.now()) / 1000);
      return seconds > 0 ? `Betting · ${seconds.toFixed(1)}s` : "Starting";
    }

    function animateMultiplier() {
      if (multiplierAnimationFrame) {
        cancelAnimationFrame(multiplierAnimationFrame);
      }

      const animate = () => {
        const difference = roundView.multiplier - displayedMultiplier;
        displayedMultiplier = Math.abs(difference) < 0.005
          ? roundView.multiplier
          : displayedMultiplier + difference * 0.35;
        currentMultiplierElement.textContent = `${displayedMultiplier.toFixed(2)}x`;

        if (displayedMultiplier !== roundView.multiplier) {
          multiplierAnimationFrame = requestAnimationFrame(animate);
        }
      };
      multiplierAnimationFrame = requestAnimationFrame(animate);
    }

    function refreshBetAvailability() {
      sendBetButton.disabled = connection?.state !== signalR.HubConnectionState.Connected
        || roundView.phase !== "Betting";
    }

    function setStreamHealth(state, text) {
      streamDotElement.className = `stream-dot ${state}`;
      streamHealthElement.textContent = text;
    }

    function toValidMultiplier(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) && parsed >= 1 ? parsed : fallback;
    }

    function compareRoundIds(left, right) {
      try {
        const leftId = BigInt(left);
        const rightId = BigInt(right);
        return leftId === rightId ? 0 : leftId > rightId ? 1 : -1;
      } catch {
        // Non-numeric IDs are not orderable; the server sequence still protects a single round.
        return 0;
      }
    }

    function createEmptyRoundView() {
      return {
        roundId: null,
        tableId: null,
        multiplier: 1,
        sequence: -1,
        startsAt: null,
        phase: "Waiting",
        lastMessageAt: 0
      };
    }

    function isCrashed(message) {
      return Boolean(readField(message, "isCrashed", "IsCrashed"));
    }

    function readField(obj, camelKey, pascalKey) {
      return obj?.[camelKey] ?? obj?.[pascalKey];
    }

    function normalizeLoginResponse(response) {
      const token = response.token ?? response.Token;
      const hubUrl = response.hubUrl ?? response.HubUrl;
      const player = response.player ?? response.Player;

      if (!token || !hubUrl || !player) {
        throw new Error("Login response must include token, hubUrl, and player.");
      }

      return { token, hubUrl, player };
    }

    function getValue(id) {
      return document.getElementById(id).value.trim();
    }

    function setStatus(value) {
      statusElement.textContent = value;
      appendLog("status", value);
    }

    function appendLog(label, value) {
      const line = `[${new Date().toISOString()}] ${label}: ${JSON.stringify(value, null, 2)}`;
      logElement.textContent = `${line}\n${logElement.textContent}`;
    }

    window.addEventListener("unhandledrejection", event => {
      setStatus("error");
      appendLog("error", event.reason?.message ?? String(event.reason));
    });

    setInterval(() => {
      if (roundView.phase === "Betting") {
        if (roundView.startsAt && roundView.startsAt.getTime() <= Date.now()) {
          roundView.phase = "Starting";
        }
        renderRoundView();
      }

      if (roundView.phase === "Running" && Date.now() - roundView.lastMessageAt > 1500) {
        setStreamHealth("stale", "Tick stream delayed");
      }
    }, 100);
  </script>
</body>
</html>
